<svg width="1200" height="240" viewBox="0 0 1200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .name {
      font: 700 52px 'Segoe UI', -apple-system, BlinkMacSystemFont, Ubuntu, Helvetica, Arial, sans-serif;
      fill: #f1f5f9;
      letter-spacing: -0.5px;
    }
    .title {
      font: 400 20px 'Segoe UI', -apple-system, BlinkMacSystemFont, Ubuntu, Helvetica, Arial, sans-serif;
      fill: #94a3b8;
      letter-spacing: 0.5px;
    }
    .accent { fill: #0ea5e9; }
    .prompt {
      font: 500 16px 'SF Mono', 'Fira Code', Consolas, Menlo, monospace;
      fill: #38bdf8;
    }
    .cmd {
      font: 400 16px 'SF Mono', 'Fira Code', Consolas, Menlo, monospace;
      fill: #64748b;
    }
    .fade-1 { opacity: 0; animation: fadeUp 0.8s ease-out 0.1s forwards; }
    .fade-2 { opacity: 0; animation: fadeUp 0.8s ease-out 0.45s forwards; }
    .fade-3 { opacity: 0; animation: fadeUp 0.8s ease-out 0.8s forwards; }
    .line-draw {
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: draw 1s ease-out 0.9s forwards;
    }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    .glow { animation: pulse 4s ease-in-out infinite; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes blink { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.7; } }
  </style>

  <!-- Background -->
  <rect width="1200" height="240" rx="12" fill="#0f172a"/>
  <rect width="1200" height="240" rx="12" fill="url(#bgGradient)"/>

  <!-- Subtle dot grid, right side -->
  <g fill="#1e293b">
    <circle cx="880" cy="40" r="2"/><circle cx="920" cy="40" r="2"/><circle cx="960" cy="40" r="2"/><circle cx="1000" cy="40" r="2"/><circle cx="1040" cy="40" r="2"/><circle cx="1080" cy="40" r="2"/><circle cx="1120" cy="40" r="2"/>
    <circle cx="880" cy="80" r="2"/><circle cx="920" cy="80" r="2"/><circle cx="960" cy="80" r="2"/><circle cx="1000" cy="80" r="2"/><circle cx="1040" cy="80" r="2"/><circle cx="1080" cy="80" r="2"/><circle cx="1120" cy="80" r="2"/>
    <circle cx="880" cy="120" r="2"/><circle cx="920" cy="120" r="2"/><circle cx="960" cy="120" r="2"/><circle cx="1000" cy="120" r="2"/><circle cx="1040" cy="120" r="2"/><circle cx="1080" cy="120" r="2"/><circle cx="1120" cy="120" r="2"/>
    <circle cx="880" cy="160" r="2"/><circle cx="920" cy="160" r="2"/><circle cx="960" cy="160" r="2"/><circle cx="1000" cy="160" r="2"/><circle cx="1040" cy="160" r="2"/><circle cx="1080" cy="160" r="2"/><circle cx="1120" cy="160" r="2"/>
    <circle cx="880" cy="200" r="2"/><circle cx="920" cy="200" r="2"/><circle cx="960" cy="200" r="2"/><circle cx="1000" cy="200" r="2"/><circle cx="1040" cy="200" r="2"/><circle cx="1080" cy="200" r="2"/><circle cx="1120" cy="200" r="2"/>
  </g>

  <!-- Soft glow accent, top-right -->
  <circle class="glow" cx="1060" cy="30" r="160" fill="url(#glowGradient)"/>

  <!-- Terminal-style line -->
  <text class="prompt fade-1" x="72" y="72">~/vijay-parmar <tspan class="cmd">$ whoami</tspan><tspan class="accent cursor">▍</tspan></text>

  <!-- Name -->
  <text class="name fade-2" x="70" y="134">Vijay Parmar</text>

  <!-- Accent underline, draws in -->
  <line class="line-draw" x1="72" y1="152" x2="192" y2="152" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text class="title fade-3" x="72" y="188">AI Integration Specialist <tspan class="accent">·</tspan> Laravel <tspan class="accent">·</tspan> Full-Stack Developer <tspan class="accent">·</tspan> 10+ Years</text>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.7" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0c1a30"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
