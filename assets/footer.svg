<svg width="1200" height="70" viewBox="0 0 1200 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .tag {
      font: 400 15px 'SF Mono', 'Fira Code', Consolas, Menlo, monospace;
      fill: #64748b;
    }
    .accent { fill: #0ea5e9; }
    .shimmer { animation: slide 3.5s ease-in-out infinite; }
    @keyframes slide {
      0% { transform: translateX(-300px); }
      100% { transform: translateX(1500px); }
    }
  </style>

  <rect width="1200" height="70" rx="12" fill="#0f172a"/>

  <!-- Base line -->
  <line x1="60" y1="35" x2="1140" y2="35" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>

  <!-- Shimmer sweep -->
  <g clip-path="url(#clipLine)">
    <rect class="shimmer" x="0" y="33" width="220" height="4" rx="2" fill="url(#shimmerGradient)"/>
  </g>

  <!-- Center label on the line -->
  <rect x="440" y="20" width="320" height="30" rx="15" fill="#0f172a"/>
  <text class="tag" x="600" y="40" text-anchor="middle">console.log(<tspan class="accent">'thanks for visiting'</tspan>);</text>

  <defs>
    <clipPath id="clipLine">
      <rect x="60" y="30" width="1080" height="10" rx="5"/>
    </clipPath>
    <linearGradient id="shimmerGradient" x1="0" y1="0" x2="220" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
